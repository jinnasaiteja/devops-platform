apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform-app
  template:
    metadata:
      labels:
        app: devops-platform-app
    spec:
      containers:
        - name: devops-platform-app
          image: 282048599244.dkr.ecr.us-east-1.amazonaws.com/devops-platform-repo:latest
          ports:
            - containerPort: 8000